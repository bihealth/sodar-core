{% load projectroles_common_tags %}
{% get_app_setting 'projectroles' 'dropdown_user_name_display' user=request.user as dropdown_user_name_display %}

{% if dropdown_user_name_display %}
  <div class="badge badge-pill"
       id="sodar-navbar-user-dropdown-username">
    <i class="iconify" data-icon="{{ icon }}"></i>
    {{ request.user.username|truncatechars:32 }}
  </div>
{% else %}
  <i class="iconify" data-icon="{{ icon }}"></i>
{% endif %}
